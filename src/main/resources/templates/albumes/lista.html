<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaCloud | Álbumes</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">

        <div class="top">
            <div>
                <h1>Álbumes</h1>
                <p>Organiza tus fotos, videos y documentos por colecciones.</p>
            </div>

            <a class="btn" href="/albumes/nuevo">Nuevo álbum</a>
        </div>

        <section class="card">

            <h2>Mis álbumes</h2>

            <div th:if="${albumes == null or #lists.isEmpty(albumes)}">
                <p>No hay álbumes registrados todavía.</p>
                <a class="btn" href="/albumes/nuevo">Crear primer álbum</a>
            </div>

            <div class="album-grid" th:if="${albumes != null and !#lists.isEmpty(albumes)}">

                <article class="album-card-solid"
                         th:each="a : ${albumes}"
                         th:style="'background:' + (${a.color} ?: '#2563eb')">

                    <div class="album-menu">

                        <details>
                            <summary>⋯</summary>

                            <div class="album-dropdown">

                                <a th:href="@{/albumes/editar/{id}(id=${a.id})}">
                                    Editar
                                </a>

                                <form method="post"
                                      th:action="@{/albumes/eliminar/{id}(id=${a.id})}">
                                    <button type="submit"
                                            onclick="return confirm('¿Seguro que deseas eliminar este álbum? También se eliminarán los archivos asociados.');">
                                        Eliminar
                                    </button>
                                </form>

                            </div>
                        </details>

                    </div>

                    <a class="album-open-area"
                       th:href="@{/albumes/ver/{id}(id=${a.id})}">

                        <div class="album-main-icon">
                            <span th:text="${a.publico ? '📁' : '🔒'}">📁</span>
                        </div>

                        <div class="album-card-info">

                            <h3 th:text="${a.nombre}">Nombre del álbum</h3>

                            <p th:if="${a.descripcion != null and !#strings.isEmpty(a.descripcion)}"
                               th:text="${a.descripcion}">
                                Descripción del álbum
                            </p>

                            <p th:if="${a.descripcion == null or #strings.isEmpty(a.descripcion)}">
                                Sin descripción.
                            </p>

                        </div>

                        <div class="album-card-footer">

                            <span class="album-pill"
                                  th:text="${a.publico ? 'Público' : 'Privado'}">
                                Público
                            </span>

                            <span class="album-date"
                                  th:text="${a.fechaCreacion}">
                                Fecha
                            </span>

                        </div>

                    </a>

                </article>

            </div>

        </section>

    </main>

</div>

</body>
</html>
