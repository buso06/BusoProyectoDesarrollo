<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MediaCloud | Archivos</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">

        <div class="top">
            <h1>Archivos multimedia</h1>
            <a class="btn" href="/archivos/nuevo">Subir archivo</a>
        </div>

        <section class="card" style="margin-bottom:14px">
            <form method="get" action="/archivos" class="actions">

                <select name="estado">
                    <option value="">Todos los estados</option>
                    <option th:each="e : ${estados}"
                            th:value="${e}"
                            th:text="${e}"
                            th:selected="${estado == e.name()}">
                    </option>
                </select>

                <select name="categoriaId">
                    <option value="">Todas las categorías</option>
                    <option th:each="c : ${categorias}"
                            th:value="${c.id}"
                            th:text="${c.nombre}"
                            th:selected="${categoriaId != null and categoriaId == c.id}">
                    </option>
                </select>

                <button class="btn" type="submit">Filtrar</button>
                <a class="btn gray" href="/archivos">Limpiar</a>

            </form>
        </section>

        <section class="card">

            <h2>Mis archivos</h2>

            <div th:if="${archivos == null or #lists.isEmpty(archivos)}">
                <p>No hay archivos registrados todavía.</p>
            </div>

            <table th:if="${archivos != null and !#lists.isEmpty(archivos)}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Tamaño</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="a : ${archivos}">
                    <td th:text="${a.id}">1</td>

                    <td th:text="${a.nombreOriginal}">archivo.jpg</td>

                    <td th:text="${a.tipoMime}">image/jpeg</td>

                    <td th:text="${a.tamanioBytes + ' bytes'}">1000 bytes</td>

                    <td>
                        <span class="badge" th:text="${a.estado}">ACTIVO</span>
                    </td>

                    <td th:text="${a.fechaCarga}">2026-06-23</td>

                    <td class="actions">

                        <a class="btn gray"
                           th:href="@{/archivos/editar/{id}(id=${a.id})}">
                            Editar
                        </a>

                        <a class="btn"
                           th:href="@{/archivos/ver/{id}(id=${a.id})}"
                           target="_blank">
                            Abrir
                        </a>

                        <a class="btn gray"
                           th:href="@{/archivos/descargar/{id}(id=${a.id})}">
                            Descargar
                        </a>

                        <form method="post"
                              th:action="@{/archivos/papelera/{id}(id=${a.id})}"
                              style="display:inline;">
                            <button class="btn danger" type="submit">
                                Papelera
                            </button>
                        </form>

                        <form method="post"
                              th:action="@{/archivos/eliminar/{id}(id=${a.id})}"
                              style="display:inline;">
                            <button class="btn danger"
                                    type="submit"
                                    onclick="return confirm('¿Seguro que deseas eliminar este archivo definitivamente?');">
                                Eliminar
                            </button>
                        </form>

                    </td>
                </tr>
                </tbody>
            </table>

        </section>

    </main>

</div>

</body>
</html>
