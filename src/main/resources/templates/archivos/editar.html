<!doctype html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Editar archivo</title><link rel="stylesheet" href="/css/styles.css"></head><body><div class="layout"><div th:replace="~{fragments/sidebar :: sidebar}"></div><main class="content"><section class="card form"><h1>Editar archivo</h1><p th:text="${archivo.nombreOriginal}"></p><form method="post" th:action="@{/archivos/actualizar/{id}(id=${archivo.id})}"><div class="field"><label>Álbum</label><select name="albumId"><option value="">Sin álbum</option><option th:each="a:${albumes}" th:value="${a.id}" th:text="${a.nombre}" th:selected="${archivo.albumId==a.id}"></option></select></div><div class="field"><label>Categoría</label><select name="categoriaId"><option value="">Sin categoría</option><option th:each="c:${categorias}" th:value="${c.id}" th:text="${c.nombre}" th:selected="${archivo.categoriaId==c.id}"></option></select></div><div class="field"><label>Estado</label><select name="estado"><option th:each="e:${estados}" th:value="${e}" th:text="${e}" th:selected="${archivo.estado==e}"></option></select></div><button class="btn">Actualizar</button> <a class="btn gray" href="/archivos">Volver</a></form></section></main></div></body></html>
