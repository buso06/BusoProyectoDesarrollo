<!doctype html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Usuario</title><link rel="stylesheet" href="/css/styles.css"></head><body><div class="layout"><div th:replace="~{fragments/sidebar :: sidebar}"></div><main class="content"><section class="card form"><h1>Formulario de usuario</h1><form method="post" action="/usuarios/guardar" th:object="${usuarioForm}"><input type="hidden" th:field="*{id}"><div class="field"><label>Nombre</label><input th:field="*{nombre}" required></div><div class="field"><label>Correo</label><input th:field="*{correo}" type="email" required></div><div class="field" th:if="*{id == null}"><label>Contraseña</label><input th:field="*{clave}" type="password" required></div><div class="field"><label>Rol</label><select th:field="*{rol}"><option th:each="r:${roles}" th:value="${r}" th:text="${r}"></option></select></div><div class="field"><label><input type="checkbox" th:field="*{activo}"> Activo</label></div><button class="btn">Guardar</button> <a class="btn gray" href="/usuarios">Volver</a></form></section></main></div></body></html>
