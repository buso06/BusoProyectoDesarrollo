<!doctype html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Usuarios</title><link rel="stylesheet" href="/css/styles.css"></head><body><div class="layout"><div th:replace="~{fragments/sidebar :: sidebar}"></div><main class="content"><div class="top"><h1>Usuarios</h1><a class="btn" href="/usuarios/nuevo">Nuevo usuario</a></div><table><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr><tr th:each="u:${usuarios}"><td th:text="${u.id}"></td><td th:text="${u.nombre}"></td><td th:text="${u.correo}"></td><td><span class="badge" th:text="${u.rol}"></span></td><td th:text="${u.activo?'Sí':'No'}"></td><td class="actions"><a class="btn gray" th:href="@{/usuarios/editar/{id}(id=${u.id})}">Editar</a><form method="post" th:action="@{/usuarios/desactivar/{id}(id=${u.id})}"><button class="btn danger">Desactivar</button></form></td></tr></table></main></div></body></html>
