<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir archivo</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">

        <section class="card form">

            <h1>Subir archivo multimedia</h1>

            <form method="post" action="/archivos/guardar" enctype="multipart/form-data">

                <div class="field">
                    <label>Archivo</label>
                    <input type="file" name="archivo" required>
                </div>

                <div class="field">
                    <label>Álbum</label>
                    <select name="albumId">
                        <option value="">Sin álbum</option>
                        <option th:each="a : ${albumes}"
                                th:value="${a.id}"
                                th:text="${a.nombre}">
                        </option>
                    </select>
                </div>

                <div class="field">
                    <label>Categoría</label>
                    <select name="categoriaId">
                        <option value="">Sin categoría</option>
                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>
                    </select>
                </div>

                <div class="actions">
                    <button class="btn" type="submit">Guardar</button>
                    <a class="btn gray" href="/archivos">Volver</a>
                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
