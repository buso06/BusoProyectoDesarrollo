<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaCloud | Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="login">

<section class="card">

    <h1>MediaCloud</h1>
    <p>Gestor multimedia local</p>

    <p class="error" th:if="${param.error}">
        Correo o contraseña incorrectos.
    </p>

    <p style="color:#16a34a; font-weight:700;" th:if="${param.registro}">
        Usuario creado correctamente. Ahora puede iniciar sesión.
    </p>

    <form method="post" action="/login">

        <div class="field">
            <label>Correo</label>
            <input name="correo"
                   type="email"
                   placeholder="usuario@correo.com"
                   required>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <input name="clave"
                   type="password"
                   placeholder="Contraseña"
                   required>
        </div>

        <button class="btn" type="submit">Ingresar</button>

    </form>

    <div style="margin-top:18px;">
        <p class="footer-note">¿No tienes cuenta?</p>
        <a class="btn gray" th:href="@{/registro}">Crear usuario nuevo</a>
    </div>

    <p class="footer-note">
        Usuario prueba: admin@mediacloud.local / admin123
    </p>

</section>

</body>
</html>
