<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MediaCloud | Categorías</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">

        <div class="top">
            <div>
                <h1>Categorías</h1>
                <p>Administre las categorías usadas para clasificar archivos multimedia.</p>
            </div>

            <a class="btn" href="/categorias/nuevo">Nueva categoría</a>
        </div>

        <section class="card">

            <h2>Listado de categorías</h2>

            <div th:if="${categorias == null or #lists.isEmpty(categorias)}">
                <p>No hay categorías registradas todavía.</p>
                <a class="btn" href="/categorias/nuevo">Crear primera categoría</a>
            </div>

            <table th:if="${categorias != null and !#lists.isEmpty(categorias)}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.id}">1</td>

                    <td th:text="${c.nombre}">Fotografía</td>

                    <td th:text="${c.descripcion}">Archivos de imagen</td>

                    <td>
                        <div class="file-menu">

                            <details>
                                <summary>⋯</summary>

                                <div class="file-dropdown">

                                    <a th:href="@{/categorias/editar/{id}(id=${c.id})}">
                                        Editar
                                    </a>

                                    <form method="post"
                                          th:action="@{/categorias/eliminar/{id}(id=${c.id})}">
                                        <button type="submit"
                                                class="danger-option"
                                                onclick="return confirm('¿Seguro que deseas eliminar esta categoría?');">
                                            Eliminar
                                        </button>
                                    </form>

                                </div>
                            </details>

                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

        </section>

    </main>

</div>

</body>
</html>
