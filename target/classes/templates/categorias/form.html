<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MediaCloud | Categoría</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="content">

        <div class="top">
            <div>
                <h1 th:text="${categoria.id == null ? 'Nueva categoría' : 'Editar categoría'}">
                    Categoría
                </h1>
                <p>Complete los datos para clasificar mejor los archivos multimedia.</p>
            </div>

            <a class="btn gray" href="/categorias">Volver</a>
        </div>

        <section class="card">

            <p class="error" th:if="${error}" th:text="${error}">
                Error
            </p>

            <form method="post"
                  th:action="${categoria.id == null} ? @{/categorias/guardar} : @{/categorias/actualizar/{id}(id=${categoria.id})}">

                <div class="field">
                    <label>Nombre</label>
                    <input type="text"
                           name="nombre"
                           th:value="${categoria.nombre}"
                           placeholder="Ejemplo: Fotos, Videos, Documentos"
                           required>
                </div>

                <div class="field">
                    <label>Descripción</label>
                    <textarea name="descripcion"
                              placeholder="Descripción de la categoría"
                              th:text="${categoria.descripcion}"></textarea>
                </div>

                <div class="actions">
                    <button class="btn" type="submit">Guardar</button>
                    <a class="btn gray" href="/categorias">Cancelar</a>
                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
